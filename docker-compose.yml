services:
  strm_watch:
    image: ghcr.io/zaiwuli/strm_watch:latest
    container_name: strm_watch
    restart: always
    ports:
      - "8501:8501"
    environment:
      - TOOL_TYPE=PSN
      - WEBHOOK_URL=
    volumes:
      - "/volume3/媒体库/云盘:/源文件夹"
      - "/volume3/Media/网盘/ceshi:/目标文件夹"
      - "./strm_config:/config"
