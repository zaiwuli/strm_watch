version: '3.8'
services:
  strm_watch:
    image: ghcr.io/你的用户名/strm_watch:latest
    container_name: strm_watch
    restart: always
    ports:
      - "8501:8501"
    environment:
      # 仅保留基础映射环境变量
      - SOURCE_DIR=/源文件夹
      - TARGET_DIR=/目标文件夹
      # 以下可选填，不填则在启动后通过网页填写
      - MS_URL=
      - MS_API_KEY=
      - OLD_KEYWORD=
      - NEW_MOUNT_PREFIX=
    volumes:
      - "/你的群晖原始路径:/源文件夹"
      - "/你的群晖输出路径:/目标文件夹"