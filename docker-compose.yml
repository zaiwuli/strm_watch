version: '3.8'
services:
  strm_watch:
    image: ghcr.io/YOUR_USERNAME/strm_watch:latest
    container_name: strm_watch
    restart: always
    ports:
      - "8501:8501"
    environment:
      - SOURCE_DIR=/源文件夹
      - TARGET_DIR=/目标文件夹
      - OLD_KEYWORD=/CloudNAS/CloudDrive/115open/
      - NEW_MOUNT_PREFIX=/115/
      - MS_URL=https://your-ms-address
      - MS_API_KEY=your-key
    volumes:
      - "/your/nas/raw/path:/源文件夹"
      - "/your/nas/strm/path:/目标文件夹"
